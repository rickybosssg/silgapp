apply plugin: 'com.android.application'

def localReleaseSigning = new Properties()
def localReleaseSigningFile = [
        rootProject.file("../work-certs/codex-upload-key.properties"),
        rootProject.file("work-certs/codex-upload-key.properties"),
        project.file("../../work-certs/codex-upload-key.properties")
].find { it.exists() }
if (localReleaseSigningFile != null) {
    localReleaseSigningFile.withInputStream { localReleaseSigning.load(it) }
}

android {
    namespace "com.base6a0ec08f3af5e1d1284254c1.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.base6a0ec08f3af5e1d1284254c1.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 49
        versionName "1.0.42"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def releaseStoreFile = project.findProperty("MYAPP_RELEASE_STORE_FILE") ?: localReleaseSigning.getProperty("MYAPP_RELEASE_STORE_FILE")
            def releaseStorePassword = project.findProperty("MYAPP_RELEASE_STORE_PASSWORD") ?: localReleaseSigning.getProperty("MYAPP_RELEASE_STORE_PASSWORD")
            def releaseKeyAlias = project.findProperty("MYAPP_RELEASE_KEY_ALIAS") ?: localReleaseSigning.getProperty("MYAPP_RELEASE_KEY_ALIAS")
            def releaseKeyPassword = project.findProperty("MYAPP_RELEASE_KEY_PASSWORD") ?: localReleaseSigning.getProperty("MYAPP_RELEASE_KEY_PASSWORD")
            if (!releaseStoreFile && localReleaseSigningFile != null) {
                releaseStoreFile = new File(localReleaseSigningFile.parentFile, "codex-upload-keystore.jks").absolutePath
            }
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.firebase:firebase-messaging:23.1.2"
    implementation "com.google.android.gms:play-services-code-scanner:16.1.0"
    implementation "com.google.android.gms:play-services-location:21.0.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
